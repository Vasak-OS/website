<div class="flex flex-col mx-3 mt-3 bg-ui-bg/80 rounded-corner">
  <div class="w-full draggable">
    <div class="container flex flex-col mx-auto">
      <div class="flex flex-col items-center w-full my-20">
        <span class="mb-8">
          <img src="/img/logo.svg" alt="logo" loading="lazy" class="h-20" />
        </span>
        <div class="flex flex-col items-center gap-6">
          <div
            class="flex flex-wrap items-center justify-center gap-5 lg:gap-12 gap-y-3 lg:flex-nowrap text-dark-grey-900">
            <a href="https://vasak.net.ar/" rel="noopener" target="_blank" class="text-gray-500 hover:text-primary">Desarrollo de Software</a>
            <a href="/privacy/" class="text-gray-500 hover:text-primary">Privacy policy</a>
            <a href="/terms/" class="text-gray-500 hover:text-primary">Terms of service</a>
            <a href="/changelogs/" class="text-gray-500 hover:text-primary">Changelogs</a>
            <a href="https://roadmap.os.vasak.net.ar/" rel="noopener" target="_blank" class="text-gray-500 hover:text-primary">Roadmap</a>
          </div>
          <div class="flex items-center gap-8">
            {{ range .Site.Params.social.main }}
            <a href="{{ .url }}" alt="{{ .name }}" aria-label="{{ .name }}" target="_blank"
              class="text-primary hover:text-secondary">
              <em class="{{ .params.icon }}"></em>
            </a>
            {{ end }}
          </div>
          {{ partial "footer/badgets.html" . }}
        </div>
      </div>
    </div>
  </div>
</div>

  </div>
</div>
