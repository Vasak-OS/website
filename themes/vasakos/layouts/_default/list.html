{{ define "main" }}

<main class="px-2 py-8">
  <div class="container flex justify-between mx-auto gap-2">
    <div class="w-full">

      {{ $paginator := .Paginate .Data.Pages.ByDate.Reverse }}

      {{ range $paginator.Pages }}

      {{ .Render "card" }}

      {{ end }}

      {{- partial "pagination.html" $paginator -}}

    </div>

    <div class="hidden max-w-xl lg:block">
      {{ partial "sections/sidebar.html" . -}}
    </div>

  </div>
</main>

{{ end }}
