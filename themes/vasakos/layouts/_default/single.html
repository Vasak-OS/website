{{ define "main" }}
{{- partial "sections/breadcrumbs.html" . -}}
<main class="py-8">
  <div class="container flex justify-between mx-auto">
    <div class="w-full lg:w-8/12">
      <div class="md:px-8">
        <div
          class="flex flex-col px-6 md:px-16 py-10 mx-auto bg-ui-bg/80 text-gray-600 dark:text-gray-200 rounded-corner shadow-md"
          id="article">
          <h1 class="text-center text-primary">{{.Title}}</h1>
          {{ .Content }}
        </div>
      </div>
    </div>

    <div class="hidden w-4/12 mx-8 lg:block">
      {{ partial "sections/sidebar-single.html" . -}}
    </div>

  </div>
</main>

{{ end }}
